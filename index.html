const tabRow = document.getElementById('tabs');
const panelWrap = document.getElementById('panels');

function renderPanel(d) {
  const totalItems = d.sections.reduce((s, sec) => s + sec.items.length, 0);
  let html = `<div class="panel ${d.cls}" id="panel-${d.idx}">
    <div class="panel-header">
      <p class="panel-title">${d.name}</p>
      <p class="panel-sub">${d.sub}</p>
    </div>
    <div class="panel-body">
      <div class="prog-bar-wrap">
        <div class="prog-track"><div class="prog-fill" id="pf-${d.idx}" style="width:0%"></div></div>
        <span class="prog-text" id="pt-${d.idx}">0 / ${totalItems}</span>
        <button class="reset-btn" onclick="resetPanel(${d.idx})">초기화</button>
      </div>`;
  d.sections.forEach((sec, si) => {
    html += `<div class="section-title">${sec.title}</div>`;
    sec.items.forEach((item, ii) => {
      const key = `${d.idx}-${si}-${ii}`;
      html += `<div class="item-row" id="ir-${key}" onclick="toggleItem('${key}',${d.idx},${totalItems})">
        <div class="cb"><div class="cb-inner"></div></div>
        <span class="item-text">${item}</span>
      </div>`;
    });
  });
  html += `<div class="quote-box"><p class="quote-text">"${d.quote}"</p></div></div></div>`;
  return html;
}

DATA.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.dataset.i = i;
  btn.textContent = d.name;
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
    btn.classList.add('active');
    document.getElementById('panel-' + i).classList.add('show');
  };
  tabRow.appendChild(btn);
  panelWrap.innerHTML += renderPanel(d);
});

document.getElementById('panel-0').classList.add('show');

function toggleItem(key, panelIdx, total) {
  const row = document.getElementById('ir-' + key);
  row.classList.toggle('checked');
  updateProgress(panelIdx, total);
}

function updateProgress(panelIdx, total) {
  const panel = document.getElementById('panel-' + panelIdx);
  const checked = panel.querySelectorAll('.item-row.checked').length;
  const pct = Math.round(checked / total * 100);
  document.getElementById('pf-' + panelIdx).style.width = pct + '%';
  document.getElementById('pt-' + panelIdx).textContent = checked + ' / ' + total;
}

function resetPanel(panelIdx) {
  const panel = document.getElementById('panel-' + panelIdx);
  const total = panel.querySelectorAll('.item-row').length;
  panel.querySelectorAll('.item-row').forEach(r => r.classList.remove('checked'));
  document.getElementById('pf-' + panelIdx).style.width = '0%';
  document.getElementById('pt-' + panelIdx).textContent = '0 / ' + total;
}
